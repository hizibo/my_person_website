server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理 - XMind 工具（直接转发 Python，不经过 Java）
    location /api/tool/xmind/ {
        proxy_pass http://python-tools:8001/xmind/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        client_max_body_size 10m;
    }

    # API 代理 - 批量数据生成（直接转发 Python，不经过 Java）
    location /api/tool/datagen/ {
        proxy_pass http://python-tools:8001/datagen/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        client_max_body_size 10m;
    }

    # API 代理 - 测试引擎 V2.0（直接转发 Python，含 WebSocket 升级）
    location /api/tool/test-engine/ {
        proxy_pass http://python-tools:8001/test-engine/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        client_max_body_size 50m;
    }

    # WebSocket 代理 - 测试引擎实时推送
    location /ws/test-engine/ {
        proxy_pass http://python-tools:8001/test-engine/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        client_max_body_size 50m;
    }

    # 上传文件访问（图片等）
    location /uploads/ {
        alias /uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
