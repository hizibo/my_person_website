version: '3.8'

services:
  # MySQL 数据库（部署时保持不变，仅首次创建）
  mysql:
    image: mysql:8.0
    container_name: website-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: my_website
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/init_database.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --bind-address=0.0.0.0 --skip-slave-start
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: website-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/my_website?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JAVA_OPTS: "-Xmx256m -Xms128m"
      PYTHON_XMIND_URL: http://xmind-service:8001/parse-xmind-base64
    volumes:
      - uploads_data:/uploads
    depends_on:
      mysql:
        condition: service_healthy
      xmind-service:
        condition: service_started

  # Python XMind 解析服务
  xmind-service:
    build:
      context: ./python-services
      dockerfile: Dockerfile
    container_name: website-xmind
    restart: unless-stopped
    ports:
      - "8001:8001"

  # Python 批量数据生成服务
  data-generator:
    build:
      context: ./python-services/data_generator
      dockerfile: Dockerfile
    container_name: website-datagen
    restart: unless-stopped
    ports:
      - "8002:8002"

  # Vue 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: website-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - uploads_data:/uploads:ro
    depends_on:
      - backend

volumes:
  mysql_data:
  uploads_data:
