# 测试平台默认配置（非敏感信息，纳入 Git）
website:
  base_url: "http://175.178.98.241"
  api_base: "http://175.178.98.241/api"
  admin_user: "admin"
  admin_password: "<your_admin_password>"  # 通过环境变量 WEB_ADMIN_PASSWORD 注入

browser:
  headless: true
  timeout: 30000
  screenshot_on_failure: true

perf:
  default_users: 100
  default_spawn_rate: 10
  default_duration: 60

report:
  allure_results_dir: "reports/allure-results"
  allure_report_dir: "reports/html"
  max_kept_reports: 30

engine:
  max_concurrent_tasks: 3
  task_timeout_seconds: 3600
  queue_max_size: 100
